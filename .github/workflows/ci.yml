name: CI/CD pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train model to produce model.pkl
        run: python train.py

      - name: Run pytest
        run: pytest test_api.py -v

  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python and train model
        run: |
          pip install -r requirements.txt
          python train.py

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/spam-classifier:latest

      - name: Smoke test
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/spam-classifier:latest
          docker run -d -p 8000:8000 --name smoketest \
            ${{ secrets.DOCKER_USERNAME }}/spam-classifier:latest
          sleep 5
          curl --fail http://localhost:8000/health || exit 1
          echo "Smoke test passed!"
          docker stop smoketest
